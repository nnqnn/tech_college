services:
  postgres:
    image: postgres:16-alpine
    container_name: dating-postgres
    environment:
      POSTGRES_DB: dating
      POSTGRES_USER: dating
      POSTGRES_PASSWORD: dating
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating -d dating"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dating-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: dating-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: dating
      RABBITMQ_DEFAULT_PASS: dating
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
