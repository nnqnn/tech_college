services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: store_user
      POSTGRES_PASSWORD: store_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_user -d store"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://store_user:store_password@db:5432/store
    command: python main.py

volumes:
  postgres_data:
